<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boutique · Casino Ryan Inc.</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
    }

    body {
      background: linear-gradient(145deg, #f5f7fa 0%, #eef0f5 100%);
      font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
      min-height: 100vh;
      padding: 24px 16px;
      color: #1a2639;
    }

    .boutique-container {
      max-width: 1300px;
      margin: 0 auto;
    }

    .en-tete {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 16px;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #1e3b5c, #2a4a6e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .badge-panier {
      background: #1f3a5f;
      color: white;
      padding: 12px 24px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1.1rem;
      box-shadow: 0 6px 12px rgba(0,20,40,0.08);
      cursor: pointer;
      transition: 0.15s;
      border: 1px solid #356494;
    }

    .badge-panier:hover {
      background: #142b44;
      transform: scale(1.02);
    }

    .grille-produits {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 26px;
      margin-bottom: 40px;
    }

    .carte-produit {
      background: white;
      border-radius: 28px;
      padding: 24px 20px 22px;
      box-shadow: 0 15px 25px -8px rgba(0,0,0,0.07);
      transition: all 0.2s ease;
      border: 1px solid #dfe7f0;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .carte-produit:hover {
      transform: translateY(-5px);
      box-shadow: 0 25px 35px -10px rgba(26, 48, 77, 0.15);
      border-color: #b6cde0;
    }

    .badge-promo {
      position: absolute;
      top: 18px;
      right: 18px;
      background: #c94b4b;
      color: white;
      font-weight: 800;
      font-size: 1.3rem;
      padding: 8px 14px;
      border-radius: 60px;
      box-shadow: 0 4px 10px rgba(201, 75, 75, 0.3);
      letter-spacing: -0.5px;
    }

    .nom-produit {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 10px;
      color: #0f293f;
      padding-right: 60px;
    }

    .prix-container {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin: 12px 0 8px;
      flex-wrap: wrap;
    }

    .prix-original {
      font-size: 1.1rem;
      color: #7a8ea8;
      text-decoration: line-through;
    }

    .prix-final {
      font-size: 2rem;
      font-weight: 800;
      color: #1f3a5f;
    }

    .unite-points {
      font-size: 1rem;
      font-weight: 400;
      color: #5e7a9c;
      margin-left: 4px;
    }

    .description-produit {
      color: #415a77;
      margin: 14px 0 20px;
      line-height: 1.5;
      font-size: 0.95rem;
      flex: 1;
    }

    .bouton-commander {
      background: #1f3a5f;
      color: white;
      border: none;
      padding: 16px 12px;
      border-radius: 48px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.15s;
      border: 1px solid #2c5580;
      box-shadow: 0 8px 16px rgba(0, 32, 64, 0.12);
      margin-top: 6px;
    }

    .bouton-commander:hover {
      background: #0e2a44;
      transform: scale(1.01);
    }

    .panier-panneau {
      background: white;
      border-radius: 32px;
      padding: 24px 26px;
      box-shadow: 0 20px 35px -8px rgba(0,0,0,0.12);
      margin-top: 20px;
      border: 1px solid #d7e1ec;
    }

    .titre-panier {
      font-size: 1.7rem;
      font-weight: 600;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .liste-panier {
      list-style: none;
      padding: 0;
      margin: 0 0 20px;
    }

    .item-panier {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid #e5ecf3;
    }

    .info-item {
      font-weight: 500;
    }

    .prix-item {
      font-weight: 700;
      color: #1e3b5c;
    }

    .btn-supprimer {
      background: none;
      border: 1px solid #cbdae7;
      color: #4f658d;
      border-radius: 30px;
      padding: 4px 12px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .total-panier {
      font-size: 1.5rem;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      margin: 20px 0 22px;
    }

    .actions-panier {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .bouton-finaliser {
      background: #1e3b5c;
      color: white;
      border: none;
      padding: 16px 28px;
      border-radius: 48px;
      font-weight: 700;
      font-size: 1.2rem;
      cursor: pointer;
      flex: 2;
    }

    .bouton-vider {
      background: #f1f5fa;
      border: 1px solid #bfd0e4;
      color: #2a4a6e;
      padding: 16px 20px;
      border-radius: 48px;
      font-weight: 500;
      cursor: pointer;
    }

    .message-commande {
      margin-top: 18px;
      padding: 14px 18px;
      border-radius: 40px;
      background: #e4f0e7;
      color: #1e4a3a;
      font-weight: 500;
    }

    .form-commande {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .champ-nom {
      padding: 16px 20px;
      border: 1.5px solid #c7d7e9;
      border-radius: 48px;
      font-size: 1rem;
    }

    .vide-message {
      text-align: center;
      padding: 36px;
      color: #677e9e;
      font-size: 1.2rem;
    }

    footer {
      margin-top: 30px;
      color: #7087a8;
      text-align: center;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
<div class="boutique-container">
  <div class="en-tete">
    <h1>🛍️ Boutique Casino Ryan</h1>
    <div class="badge-panier" id="afficherPanierBtn">
      🛒 Panier (<span id="compteurPanier">0</span>)
    </div>
  </div>

  <div id="grilleProduits" class="grille-produits"></div>
  <div id="aucunProduit" class="vide-message hidden">Aucun produit disponible pour le moment.</div>

  <div id="panneauPanier" class="panier-panneau hidden">
    <div class="titre-panier">
      <span>🛒 Votre panier</span>
      <span style="font-size: 1rem; font-weight: normal; margin-left: auto;">Casino Ryan Inc.</span>
    </div>
    <ul id="listePanier" class="liste-panier"></ul>
    <div class="total-panier">
      <span>Total</span>
      <span id="totalPanier">0 pts</span>
    </div>
    
    <div class="form-commande">
      <input type="text" id="nomClient" class="champ-nom" placeholder="Votre nom" autocomplete="off">
    </div>
    <div class="actions-panier">
      <button id="finaliserCommandeBtn" class="bouton-finaliser">Commander</button>
      <button id="viderPanierBtn" class="bouton-vider">Vider</button>
    </div>
    <div id="messagePanier" class="message-commande hidden"></div>
  </div>
  
  <footer>🔐 Paiement sécurisé en points · Commandes suivies avec soin</footer>
</div>

<script>
  (function() {
    "use strict";

    let produitsData = [];
    let panier = [];

    const grilleEl = document.getElementById('grilleProduits');
    const aucunProduitEl = document.getElementById('aucunProduit');
    const panneauPanier = document.getElementById('panneauPanier');
    const afficherPanierBtn = document.getElementById('afficherPanierBtn');
    const compteurPanierSpan = document.getElementById('compteurPanier');
    const listePanierEl = document.getElementById('listePanier');
    const totalPanierEl = document.getElementById('totalPanier');
    const finaliserBtn = document.getElementById('finaliserCommandeBtn');
    const viderBtn = document.getElementById('viderPanierBtn');
    const nomClientInput = document.getElementById('nomClient');
    const messagePanierEl = document.getElementById('messagePanier');

    function calculerPrixPromo(prix, promotion) {
      const prixNum = parseFloat(prix);
      const promoNum = parseFloat(promotion);
      if (isNaN(prixNum)) return 0;
      if (!isNaN(promoNum) && promoNum > 0) {
        return Math.round(prixNum * (1 - promoNum / 100));
      }
      return Math.round(prixNum);
    }

    function formaterPoints(valeur) {
      return valeur + ' pts';
    }

    async function chargerProduits() {
      try {
        const response = await fetch('shopping.json');
        if (!response.ok) throw new Error(`Erreur ${response.status}`);
        const data = await response.json();
        produitsData = Array.isArray(data) ? data : [];
      } catch (err) {
        console.error('Impossible de charger shopping.json', err);
        produitsData = [];
      } finally {
        afficherProduits();
      }
    }

    function afficherProduits() {
      grilleEl.innerHTML = '';
      if (!produitsData.length) {
        aucunProduitEl.classList.remove('hidden');
        return;
      }
      aucunProduitEl.classList.add('hidden');
      
      produitsData.forEach((prod, index) => {
        const prixOriginal = parseFloat(prod.price) || 0;
        const promotion = prod.promotion;
        const prixFinal = calculerPrixPromo(prixOriginal, promotion);
        const aPromo = promotion && parseFloat(promotion) > 0;
        
        const carte = document.createElement('div');
        carte.className = 'carte-produit';
        carte.dataset.index = index;
        
        let promoBadge = '';
        if (aPromo) {
          promoBadge = `<div class="badge-promo">-${promotion}%</div>`;
        }
        
        const prixOrigStr = formaterPoints(prixOriginal);
        const prixFinalStr = formaterPoints(prixFinal);
        
        carte.innerHTML = `
          ${promoBadge}
          <div class="nom-produit">${escapeHtml(prod.name || 'Produit')}</div>
          <div class="prix-container">
            ${aPromo ? `<span class="prix-original">${prixOrigStr}</span>` : ''}
            <span class="prix-final">${prixFinalStr}</span>
          </div>
          <div class="description-produit">${escapeHtml(prod.description || '')}</div>
          <button class="bouton-commander" data-action="ajouter">Ajouter au panier</button>
        `;
        
        const btn = carte.querySelector('.bouton-commander');
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          ajouterAuPanier(prod);
        });
        
        grilleEl.appendChild(carte);
      });
    }

    function escapeHtml(texte) {
      if (!texte) return '';
      return String(texte)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function ajouterAuPanier(produit) {
      const promotion = produit.promotion;
      const prixBase = parseFloat(produit.price) || 0;
      const prixFinal = calculerPrixPromo(prixBase, promotion);
      
      panier.push({
        id: Date.now() + Math.random(),
        name: produit.name,
        prix: prixFinal,
        promotion: promotion
      });
      
      mettreAJourPanier();
      messagePanierEl.classList.add('hidden');
    }

    function supprimerDuPanier(itemId) {
      panier = panier.filter(item => item.id !== itemId);
      mettreAJourPanier();
    }

    function viderPanier() {
      panier = [];
      mettreAJourPanier();
      messagePanierEl.classList.add('hidden');
    }

    function calculerTotal() {
      return panier.reduce((sum, item) => sum + item.prix, 0);
    }

    function mettreAJourPanier() {
      const total = calculerTotal();
      compteurPanierSpan.textContent = panier.length;
      totalPanierEl.textContent = formaterPoints(total);
      
      listePanierEl.innerHTML = '';
      if (panier.length === 0) {
        const li = document.createElement('li');
        li.className = 'item-panier';
        li.style.justifyContent = 'center';
        li.style.color = '#7a8ea8';
        li.textContent = 'Votre panier est vide';
        listePanierEl.appendChild(li);
      } else {
        panier.forEach(item => {
          const li = document.createElement('li');
          li.className = 'item-panier';
          li.innerHTML = `
            <span class="info-item">${escapeHtml(item.name)}</span>
            <span class="prix-item">${formaterPoints(item.prix)}</span>
            <button class="btn-supprimer" data-id="${item.id}">✕</button>
          `;
          li.querySelector('.btn-supprimer').addEventListener('click', () => {
            supprimerDuPanier(item.id);
          });
          listePanierEl.appendChild(li);
        });
      }
    }

    // 下单：通过 GitHub API 写入 messages.json
    async function passerCommande() {
      const nom = nomClientInput.value.trim();
      if (!nom) {
        alert('Veuillez entrer votre nom.');
        return;
      }
      if (panier.length === 0) {
        alert('Votre panier est vide.');
        return;
      }
      
      // 获取现有 messages
      let messages = [];
      try {
        const resp = await fetch('messages.json');
        if (resp.ok) {
          messages = await resp.json();
        }
      } catch (e) {}
      
      if (!Array.isArray(messages)) messages = [];
      
      const maintenant = new Date();
      const dateStr = maintenant.toLocaleString('fr-FR', {
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
      
      const articles = panier.map(item => item.name).join(', ');
      const totalPoints = calculerTotal();
      
      const nouveauMessage = `${nom} a commandé [${articles}] pour ${totalPoints} pts le ${dateStr}`;
      messages.push(nouveauMessage);
      
      messagePanierEl.textContent = '✅ Commande enregistrée !';
      messagePanierEl.classList.remove('hidden');
      
      // 显示提示：需要手动更新 GitHub
      messagePanierEl.innerHTML = `✅ Commande de ${escapeHtml(nom)} enregistrée !<br>
        <small style="display:block; margin-top:8px;">⚠️ Pour sauvegarder dans GitHub, ajoutez manuellement dans <code>messages.json</code> :<br>
        "${escapeHtml(nouveauMessage)}"</small>`;
      
      console.log('Nouveau message à ajouter dans messages.json:', nouveauMessage);
      
      // 清空 panier et nom
      panier = [];
      nomClientInput.value = '';
      mettreAJourPanier();
    }

    // Event listeners
    afficherPanierBtn.addEventListener('click', () => {
      panneauPanier.classList.toggle('hidden');
    });

    finaliserBtn.addEventListener('click', passerCommande);
    
    viderBtn.addEventListener('click', () => {
      if (panier.length > 0 && confirm('Vider le panier ?')) {
        viderPanier();
      } else if (panier.length === 0) {
        viderPanier();
      }
    });

    // 初始化
    chargerProduits();
  })();
</script>
</body>
</html>
